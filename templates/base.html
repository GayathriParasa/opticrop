<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OptiCrop</title>
  <meta name="description" content="{% block description %}AI-powered crop recommendation using Random Forest ML{% endblock %}">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <script>
    (function () {
      const saved = localStorage.getItem("opticrop-theme");
      const dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      document.documentElement.setAttribute("data-theme", saved || (dark ? "dark" : "light"));
    })();
  </script>
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="{% block body_class %}{% endblock %}">
  {% block navbar %}
  <nav class="navbar navbar-expand-lg navbar-light site-nav sticky-top">
    <div class="container site-nav-bar">
      <a class="navbar-brand d-flex align-items-center gap-2" href="{{ url_for('index') }}">
        <img src="{{ url_for('static', filename='images/logo.svg') }}" alt="OptiCrop" class="nav-logo-img" width="44" height="44">
        <span>
          <strong class="nav-brand-name">OPTICROP</strong>
        </span>
      </a>

      <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse site-nav-collapse" id="navMenu">
        <ul class="navbar-nav site-nav-menu align-items-lg-center">
          <li class="nav-item"><a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" href="{{ url_for('index') }}">Home</a></li>
          <li class="nav-item"><a class="nav-link {% if request.endpoint in ['workflow', 'prediction'] %}active{% endif %}" href="{{ url_for('workflow') }}">Crop Predict</a></li>
          <li class="nav-item"><a class="nav-link {% if request.endpoint == 'about' %}active{% endif %}" href="{{ url_for('about') }}">About</a></li>
        </ul>
      </div>

      <div class="nav-actions">
        <button type="button" class="theme-toggle-btn" id="themeToggle" aria-label="Toggle light or dark mode" title="Toggle theme">
          <i class="bi bi-sun-fill theme-icon-light" aria-hidden="true"></i>
          <i class="bi bi-moon-fill theme-icon-dark d-none" aria-hidden="true"></i>
        </button>
        <a class="btn btn-sm nav-doc-btn {% if request.endpoint in ['documentation', 'documentation_detail'] %}active{% endif %}" href="{{ url_for('documentation') }}">
          <i class="bi bi-journal-text"></i> Documentation
        </a>
      </div>
    </div>
  </nav>
  {% endblock %}

  <main class="page-bg">
    {% block content %}{% endblock %}
  </main>

  {% block footer %}
  <footer class="site-footer">
    <p class="mb-0">© 2026 OptiCrop — Sustainable farming, powered by data.</p>
  </footer>
  {% endblock %}

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
